apiVersion: apps/v1
kind: deployment
metadata:
  name: mongodb-deployment
  labels:
  app: mongodb
specs:
  replicas: 1
  selector:
  matchlabels:
    app: mongodb
  template:
    metadata:
    labels:
      app: mongodb
    specs:
      containers:
      - name: mongodb
        image: mongo   
        ports:
        - containerPort: 27017
        env: 
        - name: MONGO_INITDB_ROOT_USERNAME
        value:
        - name: MONGO_INITDB_ROOT_PASSWORD
        value: 